<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>rah</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #ffffff;
        color: #111827;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      .rah-boot-shell {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        box-sizing: border-box;
      }

      .rah-boot-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        color: #111827;
      }

      .rah-boot-mark {
        color: #111827;
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0;
      }

      .rah-boot-spinner {
        width: 26px;
        height: 26px;
        box-sizing: border-box;
        border: 2px solid #e5e7eb;
        border-top-color: #71717a;
        border-radius: 999px;
        animation: rah-boot-spin 900ms linear infinite;
      }

      .rah-boot-status {
        color: #6b7280;
        font-size: 13px;
        font-weight: 500;
      }

      @keyframes rah-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="rah-boot-shell">
        <div class="rah-boot-card" aria-label="Initializing RAH">
          <div class="rah-boot-spinner" aria-hidden="true"></div>
          <div class="rah-boot-mark">RAH</div>
          <div class="rah-boot-status">Initializing...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
